name: Freshdesk sync

# Vercel Hobby caps crons at once-per-day, so this workflow drives the
# 30-min /api/cron/sync endpoint on production from GitHub Actions instead.
#
# Required repo secret:
#   CRON_SECRET — matches the CRON_SECRET env var on the Vercel deployment.
#
# Optional repo variable (Settings → Secrets and variables → Actions → Variables):
#   DEPLOY_HOST — production hostname without scheme. Defaults to the alias
#                 below if unset.
#
# v3 — 2026-06-12 — rate-limit fix.
# Schedule reduced from every-30-min during work hours to ONCE PER DAY at
# 02:00 IST (20:30 UTC). Combined with the token-bucket rate limiter
# (src/lib/freshdesk.ts) and AutoSync being made read-only (src/components
# /AutoSync.tsx), this is the only thing that auto-triggers a Freshdesk
# sync. The manual "Run sync" button on the dashboard is the only other
# trigger and is the explicit human escape hatch.

on:
  schedule:
    # Twice daily, during IST work hours:
    #   07:30 UTC = 13:00 IST (lunchtime)
    #   12:30 UTC = 18:00 IST (end of day)
    # The token-bucket rate limiter keeps us at 60 req/min outbound, so
    # the AI bot still has ≥40 req/min of headroom on the shared budget
    # even while these runs are active.
    - cron: "30 7 * * *"
    - cron: "30 12 * * *"
  # Manual trigger from the Actions tab — useful for smoke tests + ad-hoc.
  workflow_dispatch: {}
  # Run on push to this workflow file so any change is automatically smoke-tested.
  push:
    paths:
      - .github/workflows/sync.yml

permissions:
  contents: read

# Don't pile up runs if one is slow; skip the new one if a sync is mid-flight.
concurrency:
  group: freshdesk-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    # Daily sync after the 02:00 IST trigger can need many short Vercel
    # invocations to drain ~24h of activity at the 60 req/min rate cap.
    # 30 min is enough for ~20 iterations × ~90s = ~30 min of catch-up,
    # which covers a typical busy day without burning GH Actions budget.
    timeout-minutes: 30
    steps:
      - name: Drain Freshdesk sync queue
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          DEPLOY_HOST: ${{ vars.DEPLOY_HOST || 'support-performance-tracker.vercel.app' }}
          MAX_ITERATIONS: 25
        run: |
          set -euo pipefail
          if [ -z "${CRON_SECRET:-}" ]; then
            echo "::error::CRON_SECRET secret is not set on this repo. Add it at"
            echo "::error::https://github.com/<owner>/<repo>/settings/secrets/actions"
            exit 1
          fi
          echo "Host: $DEPLOY_HOST"
          echo "Looping POST /api/cron/sync until drained (max $MAX_ITERATIONS iters)…"
          echo

          ITER=0
          TOTAL_SYNCED=0
          while [ $ITER -lt $MAX_ITERATIONS ]; do
            ITER=$((ITER + 1))
            echo "── Iteration $ITER ─────────────────────────────────"
            # 75s curl timeout — slightly above Vercel's 60s maxDuration so
            # we don't bail before the function returns its actual response.
            HTTP_CODE=$(curl -s -o /tmp/sync.json -w '%{http_code}' --max-time 75 \
              -X POST "https://$DEPLOY_HOST/api/cron/sync" \
              -H "Authorization: Bearer $CRON_SECRET" \
              -H "Content-Type: application/json" || echo "000")
            echo "HTTP $HTTP_CODE"

            if [ "$HTTP_CODE" = "200" ]; then
              cat /tmp/sync.json
              echo

              # Skipped (single-flight win) → another worker is draining;
              # wait a beat and re-check.
              if jq -e '.skipped == true' /tmp/sync.json > /dev/null 2>&1; then
                echo "skipped — another sync in flight, sleeping 30s"
                sleep 30
                continue
              fi

              if jq -e '.ok == true' /tmp/sync.json > /dev/null 2>&1; then
                T=$(jq -r '.ticketsSynced // 0' /tmp/sync.json)
                TOTAL_SYNCED=$((TOTAL_SYNCED + T))
                echo "iteration synced $T tickets (cumulative: $TOTAL_SYNCED)"
                # ticketsSynced == 0 means watermark is at the present and
                # there is nothing left to fetch — we're caught up.
                if [ "$T" = "0" ]; then
                  echo "drained — caught up to present after $ITER iteration(s)."
                  break
                fi
                # More to drain → loop straight back; the token bucket
                # paces the next call, no client-side delay needed.
                continue
              fi

              echo "::warning::200 but ok != true; bailing"
              exit 1
            fi

            # 504 / 000 (timeout) / 5xx — the Vercel function was likely
            # killed mid-sync. Per-page watermark means progress is saved;
            # retry immediately. Only fail after we've burned the iteration
            # cap, not on a single timeout.
            if [ "$HTTP_CODE" = "504" ] || [ "$HTTP_CODE" = "000" ] || [ "$HTTP_CODE" = "502" ] || [ "$HTTP_CODE" = "503" ]; then
              echo "function timed out (HTTP $HTTP_CODE) — watermark advanced server-side, retrying"
              sleep 5
              continue
            fi

            # Anything else (401, 4xx) is fatal.
            echo "::error::Sync endpoint returned HTTP $HTTP_CODE — aborting"
            cat /tmp/sync.json || true
            exit 1
          done

          if [ $ITER -ge $MAX_ITERATIONS ]; then
            echo "::warning::Hit MAX_ITERATIONS ($MAX_ITERATIONS) without ticketsSynced=0. Synced ~$TOTAL_SYNCED tickets so far; next scheduled run will continue from the current watermark."
          else
            echo "✓ Sync drained cleanly: $TOTAL_SYNCED ticket(s) across $ITER iteration(s)."
          fi

      - name: Health check
        if: always()
        env:
          DEPLOY_HOST: ${{ vars.DEPLOY_HOST || 'support-performance-tracker.vercel.app' }}
        run: |
          curl -s "https://$DEPLOY_HOST/api/health" | jq '.' || echo "health endpoint unreachable"
